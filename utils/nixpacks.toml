# nixpacks.toml — Railway build config
# Installs native system libraries required by opencv-python-headless
# even when no display server is present (server / container environment).

[phases.setup]
nixPkgs = [
    "libglib2.0",
    "libgl1",
]

aptPkgs = [
    "libglib2.0-0",
    "libgl1-mesa-glx",
    "libsm6",
    "libxext6",
    "libxrender-dev",
    "libgomp1",
]

[phases.build]
cmds = [
    # Force-remove the GUI variant if it crept in, then install headless cleanly
    "pip uninstall -y opencv-python opencv-contrib-python 2>/dev/null || true",
    "pip install opencv-python-headless --upgrade",
]

[start]
cmd = "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
